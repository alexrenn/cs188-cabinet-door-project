# Training configuration for the cabinet door policy
# Works for both --diffusion (DDPM) and default (simple MLP) modes.

# Training parameters
epochs: 1000
batch_size: 256
learning_rate: 0.0001

# Action chunking: predict K future actions per step
# K=1 is standard single-step BC; K>1 enables temporal action chunking
chunk_size: 8

# Checkpoint saving
checkpoint_dir: /tmp/cabinet_policy_checkpoints

# Diffusion-specific (used only with --diffusion flag)
n_diffusion_steps: 100   # T: number of DDPM noise steps
hidden_dim: 256           # noise prediction network hidden size
weight_decay: 0.000001    # AdamW weight decay
